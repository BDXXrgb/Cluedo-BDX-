<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cluedo Premium - Enquête Privée</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        /* [Tes styles CSS existants + les nouveaux éléments Admin] */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght=500;700&family=Jost:wght=300;400;600&display=swap');
        body { font-family: 'Jost', sans-serif; background: #0a0505; color: #e0d9d9; margin: 10px; }
        .box { background: rgba(25, 15, 15, 0.85); padding: 15px; border-radius: 12px; border: 1px solid rgba(231, 76, 60, 0.2); }
        .hidden { display: none !important; }
        
        /* Bouton Admin Caché */
        .btn-secret-trigger { position: fixed; bottom: 10px; left: 10px; background: #8e44ad; opacity: 0.3; font-size: 10px; z-index: 999; }
        .btn-secret-trigger:hover { opacity: 1; }
        
        /* Panneau Admin */
        #secret-admin-panel { display: none; position: fixed; top: 10%; left: 10%; width: 80%; background: #1a0f0f; border: 2px solid #d35400; padding: 20px; z-index: 9999; border-radius: 12px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .admin-card { background: #000; padding: 10px; border: 1px solid #3a2222; }
        .btn-danger { background: #c0392b; }
        .btn-cyan { background: #2980b9; }
        .btn-green { background: #27ae60; }
        
        /* Screamer */
        .screamer-hidden { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 10000; justify-content: center; align-items: center; flex-direction: column; }
        .screamer-hidden.active { display: flex; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Cluedo Premium</h1>
        </div>

    <button onclick="document.getElementById('secret-admin-panel').style.display='block'" 
            class="btn-secret-trigger" id="admin-trigger-btn" style="display:none;">
        ⚙️ Admin Control
    </button>

    <div id="secret-admin-panel">
        <h3>👑 Control Panel Bedy</h3>
        <button onclick="this.parentElement.style.display='none'">✕ Fermer</button>
        <div class="admin-grid">
            <input type="text" id="admin-target" placeholder="Pseudo cible...">
            <button onclick="sendAdminAction('admin_trigger_screamer')" class="btn-danger">👻 Screamer</button>
            <button onclick="sendAdminAction('admin_kill_player')" class="btn-danger">💀 Kill</button>
            <button onclick="sendAdminAction('admin_revive_player')" class="btn-green">😇 Revive</button>
        </div>
    </div>

    <div id="screamer-overlay" class="screamer-hidden" onclick="this.classList.remove('active')">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z0N2pxcm55bnd6M3E0cXN6ZzF3bHlkdzZvdzBvYm9mdXRxZms3cyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/3F376Aat4qIis6Wun9/giphy.gif">
    </div>

    <script>
        const socket = io();
        let monNom = "";

        // --- SÉCURITÉ ADMIN ---
        function checkAdminAccess() {
            if (monNom === "Bedy") {
                document.getElementById('admin-trigger-btn').style.display = 'block';
            }
        }

        // --- ACTIONS ---
        function sendAdminAction(action) {
            const target = document.getElementById('admin-target').value;
            socket.emit(action, { room: currentRoom, target_name: target });
        }

        // --- RÉCEPTION SCREAMER ---
        socket.on('trigger_screamer_popup', () => {
            const overlay = document.getElementById('screamer-overlay');
            overlay.classList.add('active');
            setTimeout(() => overlay.classList.remove('active'), 3000);
        });

        // Appeler checkAdminAccess() après que le joueur entre son pseudo dans tes fonctions de join/create
    </script>
</body>
</html>
